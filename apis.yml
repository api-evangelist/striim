name: Striim
description: >-
  Unified data integration and streaming platform offering change data capture (CDC), real-time streaming analytics, and
  data validation. Exposes a token-authenticated REST API (WActionStore queries, system health, Application Management)
  consumed against your own Striim instance or Striim Cloud service.

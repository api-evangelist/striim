apis:
  - name: Striim Application Management REST API
    description: >-
      REST API to create and manage (deploy, start, stop, undeploy, drop) Striim applications, execute TQL commands,
      retrieve monitoring and file lineage data, plus WActionStore queries (GET /wactions/def, GET /wactions/search) and
      system health (GET /health). Token-authenticated; endpoints run against your own Striim server/cluster (default
      port 9080) or Striim Cloud service.
